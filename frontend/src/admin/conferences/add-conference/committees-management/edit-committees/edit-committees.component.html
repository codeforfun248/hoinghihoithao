<form [formGroup]="form">
  <div class="rounded-lg bg-white p-4 w-full">
    <div class="flex flex-col gap-2 mb-2 w-full">
      <label for="name">
        Tên ban tổ chức
        <i class="text-red-500">*</i>
      </label>
      <div class="flex items-center w-full gap-2">
        <input nz-input id="name" type="text" formControlName="name" class="w-full" />
      </div>
    </div>

    <div class="flex items-center justify-between mb-2">
      <span>Danh sách thành viên</span>
      <button nz-button nzType="primary" (click)="addMember()">
        <nz-icon nzType="plus"></nz-icon>
        Thêm thành viên
      </button>
    </div>
    <nz-table #nzTable [nzData]="members" [nzFrontPagination]="false" [nzScroll]="{ x: '800px' }">
      <thead>
        <tr>
          <th nzWidth="100px">Vị trí</th>
          <th nzWidth="100px">Học vị</th>
          <th nzWidth="100px">Tên</th>
          <th nzWidth="100px">Email</th>
          <th nzWidth="100px">Thao tác</th>
        </tr>
      </thead>
      <tbody>
        @for (data of nzTable.data; track data) {
          <tr>
            <td>{{ data.position }}</td>
            <td>{{ data.user?.academic_degree || data.academic_degree }}</td>
            <td>{{ data.user?.name || data.name }}</td>
            <td>{{ data.user?.email || data.email }}</td>
            <td>
              <a
                nz-popconfirm
                nzPopconfirmTitle="Chắn chắn xóa thành viên này?"
                (nzOnConfirm)="handleDeleteMember(data)"
                >Xóa</a
              >
            </td>
          </tr>
        }
      </tbody>
    </nz-table>
  </div>
</form>
