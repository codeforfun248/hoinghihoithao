<form [formGroup]="editSessionForm">
  <div class="rounded-lg bg-white p-4 w-full">
    <div class="flex flex-col gap-2 mb-2 w-full">
      <label for="name">
        Tiêu đề phiên
        <i class="text-red-500">*</i>
      </label>
      <div class="flex items-center w-full gap-2">
        <input nz-input id="name" type="text" formControlName="name" class="w-full" />
      </div>
    </div>
    <div class="flex flex-col gap-2 rounded-md bg-white mb-4 w-full h-fit">
      <label for="name">
        Thời gian bắt đầu
        <i class="text-red-500">*</i>
      </label>
      <div class="flex items-center w-full gap-2">
        <nz-date-picker
          [nzShowTime]="true"
          nzFormat="dd-MM-yyyy HH:mm:ss"
          formControlName="start_time"
          class="w-full"
        ></nz-date-picker>
      </div>
    </div>

    <div class="flex flex-col gap-2 rounded-md bg-white mb-4 w-full h-fit">
      <label for="name">
        Thời gian kết thúc
        <i class="text-red-500">*</i>
      </label>
      <div class="flex items-center w-full gap-2">
        <nz-date-picker
          [nzShowTime]="true"
          nzFormat="dd-MM-yyyy HH:mm:ss"
          formControlName="end_time"
          class="w-full"
        ></nz-date-picker>
      </div>
    </div>

    <div class="flex flex-col gap-2 mb-2 w-full">
      <label for="desc"> Mô tả </label>
      <div class="flex items-center w-full gap-2">
        <textarea rows="4" nz-input id="desc" formControlName="desc"></textarea>
      </div>
    </div>
  </div>
</form>
