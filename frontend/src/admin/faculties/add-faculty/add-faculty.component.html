<div class="add-category">
  <form [formGroup]="form">
    <div class="rounded-md bg-white p-4 mb-4">
      <div class="flex flex-col gap-2 w-full mb-2">
        <label for="name">
          Tên Khoa/Viện
          <i class="text-red-500">*</i></label
        >
        <div class="flex items-center w-full gap-2">
          <input
            nz-input
            id="name"
            type="text"
            formControlName="name"
            aria-label="Tên Khoa/Viện"
            class="w-full"
          />
        </div>
      </div>
    </div>
  </form>
</div>
