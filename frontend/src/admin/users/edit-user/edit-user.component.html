<form [formGroup]="editUserForm">
  <div class="rounded-lg bg-white p-4 w-full">
    <div class="w-full text-center">
      <nz-upload
        class="avatar-uploader overflow-hidden"
        nzName="avatar"
        nzListType="picture-card"
        [nzShowUploadList]="false"
        [nzBeforeUpload]="beforeUpload"
      >
        @if (!editUserForm.value.avatar) {
          <nz-icon class="upload-icon" [nzType]="uploading ? 'loading' : 'plus'" />
          <div class="ant-upload-text">Upload</div>
        } @else {
          <img [src]="editUserForm.value.avatar" style="width: 100%" />
        }
      </nz-upload>
    </div>
    <div class="flex flex-col gap-2 rounded-md bg-white mb-4 w-full h-fit">
      <label for="name">
        Họ và tên
        <i class="text-red-500">*</i>
      </label>
      <div class="flex items-center w-full gap-2">
        <input nz-input id="name" type="text" formControlName="name" class="w-full" />
      </div>
    </div>

    <div class="flex flex-col gap-2 mb-2 w-full">
      <label for="email">
        Email
        <i class="text-red-500">*</i>
      </label>
      <div class="flex items-center w-full gap-2">
        <input nz-input id="email" type="text" formControlName="email" class="w-full" />
      </div>
    </div>

    <div class="flex flex-col gap-2 rounded-md bg-white mb-4 w-full h-fit">
      <label for="name"> Học vị </label>
      <div class="flex items-center w-full gap-2">
        <input
          nz-input
          id="academic_degree"
          type="text"
          formControlName="academic_degree"
          class="w-full"
        />
      </div>
    </div>

    <div class="flex flex-col gap-2 mb-2 w-full">
      <label for="role"> Quyền </label>
      <div class="flex items-center w-full gap-2">
        <nz-select formControlName="role" class="w-full">
          <nz-option nzValue="admin" nzLabel="Admin"></nz-option>
          <nz-option nzValue="user" nzLabel="User"></nz-option>
        </nz-select>
      </div>
    </div>
  </div>
</form>
