@if (apiService.loading) {
  <div class="h-full w-full flex items-center justify-center">
    <div class="spinner">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>
  </div>
} @else {
  <router-outlet></router-outlet>
}

<div class="tdmu-ai-launcher" (click)="toggleChat()" *ngIf="!isChatOpen">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3a9 9 0 0 0 9 9 9 9 0 0 0-9 9 9 9 0 0 0-9-9 9 9 0 0 0 9-9Z"></path>
        <path d="M5 5l.01 0"></path><path d="M19 19l.01 0"></path>
        <path d="M5 19l.01 0"></path><path d="M19 5l.01 0"></path>
    </svg>
</div>

<div class="tdmu-ai-window" *ngIf="isChatOpen">
    
    <div class="tdmu-header">
        <div class="header-left">
            <div class="icon-circle">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 3a9 9 0 0 0 9 9 9 9 0 0 0-9 9 9 9 0 0 0-9-9 9 9 0 0 0 9-9Z"></path>
                </svg>
            </div>
            <div class="header-titles">
                <div class="main-title">TDMU AI Assistant</div>
                <div class="sub-status">🟢 Cố vấn học tập AI</div>
            </div>
        </div>
        <div class="close-x-btn" (click)="toggleChat()">✕</div>
    </div>

    <div class="tdmu-body">
        <div *ngFor="let msg of messages" [ngClass]="msg.role === 'ai' ? 'row-ai' : 'row-user'">
            <div class="bubble">
                {{ msg.text }}
            </div>
            <div class="meta">{{ msg.role === 'ai' ? 'Hệ thống AI' : 'Bạn' }} • {{ msg.time }}</div>
        </div>
    </div>

    <div class="tdmu-footer">
        <div class="input-container">
            <svg class="sparkle-gray-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3a9 9 0 0 0 9 9 9 9 0 0 0-9 9 9 9 0 0 0-9-9 9 9 0 0 0 9-9Z"></path>
            </svg>
            
            <input #chatInput type="text" placeholder="Hỏi tôi về nghiên cứu..." (keyup.enter)="sendToAI(chatInput.value); chatInput.value=''">
            
            <button class="send-message-btn" (click)="sendToAI(chatInput.value); chatInput.value=''">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
        <div class="disclaimer-text">Công nghệ AI có thể tạo ra thông tin không chính xác. Hãy đối chiếu với dữ liệu chính thống.</div>
    </div>
</div>
