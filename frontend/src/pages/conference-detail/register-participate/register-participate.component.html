<form class="flex flex-col gap-4">
  <div class="mb-2">
    <h2 class="text-xl font-bold text-gray-900 m-0">Đăng ký tham dự hội nghị</h2>
    <p class="text-sm text-gray-500 m-0 mt-1">Vui lòng điền đầy đủ thông tin bên dưới.</p>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1.5">
        Họ và tên <span class="text-red-500">*</span>
      </label>
      <nz-input-group [nzPrefix]="prefixUser" nzSize="large" class="rounded-lg bg-white">
        <input
          type="text"
          nz-input
          placeholder="VD: Nguyễn Văn A"
          [(ngModel)]="formData.name"
          name="name"
        />
      </nz-input-group>
      <ng-template #prefixUser><nz-icon nzType="user" class="text-gray-400" /></ng-template>
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1.5">
        Email <span class="text-red-500">*</span>
      </label>
      <nz-input-group [nzPrefix]="prefixMail" nzSize="large" class="rounded-lg bg-white">
        <input
          type="email"
          nz-input
          placeholder="VD: mail@tdmu.edu.vn"
          [(ngModel)]="formData.email"
          name="email"
        />
      </nz-input-group>
      <ng-template #prefixMail><nz-icon nzType="mail" class="text-gray-400" /></ng-template>
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1.5">Lớp</label>
      <nz-input-group [nzPrefix]="prefixBook" nzSize="large" class="rounded-lg bg-white">
        <input
          type="text"
          nz-input
          placeholder="VD: 21IT1, 22KT2..."
          [(ngModel)]="formData.className"
          name="className"
        />
      </nz-input-group>
      <ng-template #prefixBook><nz-icon nzType="book" class="text-gray-400" /></ng-template>
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1.5">Khoa</label>
      <nz-select
        nzShowSearch
        nzAllowClear
        nzPlaceHolder="Chọn khoa..."
        [(ngModel)]="formData.facultyId"
        name="facultyId"
        nzSize="large"
        class="w-full rounded-lg"
      >
        @for (item of faculties; track item._id) {
          <nz-option [nzLabel]="item.name" [nzValue]="item._id"></nz-option>
        }
      </nz-select>
    </div>
  </div>

  <div class="mt-2">
    <label class="block text-sm font-semibold text-gray-700 mb-1.5">
      Hình thức tham gia <span class="text-red-500">*</span>
    </label>
    <nz-select
      [(ngModel)]="formData.participationType"
      name="participationType"
      nzSize="large"
      class="w-full rounded-lg"
    >
      @for (type of participationTypes; track type.value) {
        <nz-option [nzLabel]="type.label" [nzValue]="type.value"></nz-option>
      }
    </nz-select>
  </div>

  <div class="mt-4">
    <button
      nz-button
      nzType="primary"
      nzSize="large"
      nzBlock
      [nzLoading]="isLoading"
      (click)="handleSubmit()"
      class="rounded-xl h-11 text-base font-semibold bg-blue-600 hover:bg-blue-700 border-none shadow-md"
    >
      Đăng ký tham dự
    </button>
  </div>
</form>
