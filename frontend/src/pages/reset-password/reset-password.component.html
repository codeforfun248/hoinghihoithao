<div class="min-h-screen flex flex-col items-center justify-center bg-gray-50 px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg border border-gray-100 p-8">
    <div class="text-center mb-8">
      <div class="w-32 mx-auto mb-4 cursor-pointer" (click)="router.navigate(['/'])">
        <img
          src="https://tdmu.edu.vn/img/brand/Logo_TDMU_2024_nguyen_ban.svg"
          alt="TDMU Logo"
          class="w-full h-auto"
        />
      </div>
      <h2 class="text-2xl font-bold text-gray-800">Đặt lại mật khẩu</h2>
      <p class="text-sm text-gray-500 mt-2">Vui lòng nhập mật khẩu mới cho tài khoản của bạn.</p>
    </div>

    <div class="flex flex-col gap-5">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Mật khẩu mới</label>
        <nz-input-password>
          <input
            nz-input
            [(ngModel)]="newPassword"
            placeholder="Ít nhất 6 ký tự"
            nzSize="large"
            class="rounded-lg"
          />
        </nz-input-password>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5"
          >Xác nhận mật khẩu mới</label
        >
        <nz-input-password>
          <input
            nz-input
            [(ngModel)]="confirmPassword"
            placeholder="Nhập lại mật khẩu mới"
            nzSize="large"
            class="rounded-lg"
            (keydown.enter)="handleReset()"
          />
        </nz-input-password>
      </div>

      <button
        nz-button
        nzType="primary"
        nzSize="large"
        nzBlock
        [nzLoading]="isLoading"
        class="mt-4 font-semibold rounded-lg shadow-sm"
        (click)="handleReset()"
      >
        Lưu mật khẩu mới
      </button>
    </div>
  </div>
</div>
