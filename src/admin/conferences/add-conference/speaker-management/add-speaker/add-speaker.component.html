<form [formGroup]="form">
  <div class="rounded-lg bg-white p-4 w-full">
    <div class="flex flex-col gap-2 mb-2 w-full">
      <label for="email">
        Email
        <i class="text-red-500">*</i>
      </label>
      <div class="flex items-center w-full gap-2">
        <nz-select
          formControlName="email"
          class="w-full"
          nzShowSearch
          (ngModelChange)="handleSelectEmail($event)"
        >
          @for (item of membersOptions; track $index) {
            <nz-option [nzValue]="item.email" [nzLabel]="item.email"></nz-option>
          }
        </nz-select>
      </div>
    </div>

    <div class="flex flex-col gap-2 mb-2 w-full">
      <label for="name">
        Họ tên
        <i class="text-red-500">*</i>
      </label>
      <div class="flex items-center w-full gap-2">
        <input nz-input id="name" type="text" formControlName="name" class="w-full" />
      </div>
    </div>

    <div class="flex flex-col gap-2 mb-2 w-full">
      <label for="academic_degree">
        Học vị
        <i class="text-red-500">*</i>
      </label>
      <div class="flex items-center w-full gap-2">
        <input
          nz-input
          id="academic_degree"
          type="text"
          formControlName="academic_degree"
          class="w-full"
        />
      </div>
    </div>

    <div class="flex flex-col gap-2 mb-2 w-full">
      <label for="position">
        Chức vụ
        <i class="text-red-500">*</i>
      </label>
      <div class="flex items-center w-full gap-2">
        <input nz-input id="position" type="text" formControlName="position" class="w-full" />
      </div>
    </div>

    <div class="flex flex-col gap-2 mb-2 w-full">
      <label for="desc">
        Mô tả
        <i class="text-red-500">*</i>
      </label>
      <div class="flex items-center w-full gap-2">
        <textarea id="desc" rows="4" nz-input formControlName="desc"></textarea>
      </div>
    </div>
  </div>
</form>
